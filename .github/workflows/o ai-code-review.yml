name: AI Code Review

on:
  push:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Instala o SDK da IA na raiz temporária da máquina virtual do GitHub
      - name: Install Gemini SDK
        run: npm install @google/genai

      # O segredo está aqui: adicionamos a flag '--experimental-default-type=module'
      # Isso força o Node a aceitar o 'import' mesmo sem um package.json por perto
      - name: Run AI Review Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node --experimental-default-type=module review.js

      - name: Add Review to Job Summary
        if: always()
        run: |
          if [ -f review_output.md ]; then
            cat review_output.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Nenhum relatório de review foi gerado." >> $GITHUB_STEP_SUMMARY
          fi
